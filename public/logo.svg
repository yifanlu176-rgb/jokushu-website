<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0b0906"/>

  <!-- Border -->
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#c9a553" stroke-width="2"/>

  <!-- Inner circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#c9a553" stroke-width="1.5" opacity="0.3"/>

  <!-- Bagua symbol (八卦) -->
  <g transform="translate(256, 256)">
    <!-- Center circle -->
    <circle r="40" fill="#c9a553" opacity="0.2"/>

    <!-- Eight trigrams positions -->
    <text x="0" y="-100" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif">☰</text>
    <text x="70" y="-70" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif" opacity="0.7">☱</text>
    <text x="100" y="0" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif" opacity="0.5">☲</text>
    <text x="70" y="70" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif" opacity="0.7">☳</text>
    <text x="0" y="100" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif">☴</text>
    <text x="-70" y="70" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif" opacity="0.7">☵</text>
    <text x="-100" y="0" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif" opacity="0.5">☶</text>
    <text x="-70" y="-70" text-anchor="middle" font-size="48" fill="#c9a553" font-family="serif" opacity="0.7">☷</text>
  </g>

  <!-- Company name -->
  <text x="256" y="420" text-anchor="middle" font-size="24" fill="#c9a553" font-family="serif" letter-spacing="4">蓐収</text>
</svg>
